:root {
  /* Surfaces */
  --bg-deep:      #0B0E14;   /* main canvas — blue-black, never pure black */
  --bg-panel:     #0E1219;   /* cards / containers */
  --bg-panel-2:   #11161F;   /* elevated / hover */
  --bg-inset:     #090C12;   /* wells, table header */
  --border:       #1E232F;   /* subtle dividers */
  --border-soft:  #161B25;
  --border-strong:#2A3242;

  /* Neon accents */
  --cyan:    #00F0FF;
  --green:   #39FF14;
  --green-2: #2BE08A;        /* tempered green for large fills */
  --purple:  #9D00FF;
  --purple-2:#B24DFF;
  --amber:   #FFB020;
  --red:     #FF3B5C;

  /* Text */
  --ink:        #E7ECF5;
  --ink-2:      #9AA4B6;
  --ink-3:      #5E6877;
  --ink-4:      #3C4453;

  /* Glow */
  --glow-cyan:   0 0 0 1px rgba(0,240,255,.20), 0 12px 40px -16px rgba(0,240,255,.45);
  --glow-green:  0 0 0 1px rgba(57,255,20,.18), 0 12px 40px -16px rgba(57,255,20,.40);
  --glow-purple: 0 0 0 1px rgba(157,0,255,.20), 0 12px 40px -16px rgba(157,0,255,.45);

  --radius:   12px;
  --radius-sm: 8px;
  --sans: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', ui-monospace, monospace;

  --sidebar-w: 264px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--bg-deep);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  /* faint vignette + grid texture for "terminal" depth */
  background-image:
    radial-gradient(120% 90% at 80% -10%, rgba(0,240,255,.05), transparent 55%),
    radial-gradient(100% 80% at 8% 110%, rgba(157,0,255,.05), transparent 55%),
    linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 44px 44px, 44px 44px;
  background-attachment: fixed;
}

::selection { background: rgba(0,240,255,.25); color: #fff; }

/* Scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1b2230; border-radius: 6px; border: 2px solid var(--bg-deep); }
::-webkit-scrollbar-thumb:hover { background: #28303f; }

/* ============================================================
   App shell
   ============================================================ */
#root { min-height: 100vh; }

.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}

/* ---------- Sidebar ---------- */
.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  background: linear-gradient(180deg, #0C1017 0%, #0A0D13 100%);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 20;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 22px 22px 20px;
  border-bottom: 1px solid var(--border-soft);
}
.brand-mark {
  width: 34px; height: 34px;
  position: relative;
  flex: none;
}
.brand-mark svg { display: block; }
.brand-name {
  font-weight: 600;
  letter-spacing: .14em;
  font-size: 14px;
  color: var(--ink);
}
.brand-name b { color: var(--cyan); font-weight: 700; }
.brand-sub {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .26em;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-top: 2px;
}

.nav {
  flex: 1;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow-y: auto;
}
.nav-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--ink-4);
  padding: 14px 12px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--ink-2);
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 400;
  border: 1px solid transparent;
  position: relative;
  transition: background .15s, color .15s, border-color .15s;
  user-select: none;
}
.nav-item svg { flex: none; width: 18px; height: 18px; opacity: .8; }
.nav-item:hover { background: #10151e; color: var(--ink); }
.nav-item:focus-visible { outline: none; background: #10151e; color: var(--ink); box-shadow: inset 0 0 0 1px rgba(0,240,255,.4); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(0,240,255,.10), rgba(0,240,255,.02));
  color: #fff;
  border-color: rgba(0,240,255,.18);
}
.nav-item.active svg { opacity: 1; color: var(--cyan); }
.nav-item.active::before {
  content: '';
  position: absolute; left: -1px; top: 8px; bottom: 8px;
  width: 2px; border-radius: 2px;
  background: var(--cyan);
  box-shadow: 0 0 10px var(--cyan);
}
.nav-item .badge {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 20px;
  background: rgba(255,255,255,.05);
  color: var(--ink-2);
  border: 1px solid var(--border);
}

.node-status {
  margin: 14px;
  padding: 13px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-inset);
  display: flex;
  align-items: center;
  gap: 11px;
}
.node-status .pulse {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 1.6s ease-in-out infinite;
  flex: none;
}
@keyframes blink {
  0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--green); }
  50% { opacity: .35; box-shadow: 0 0 2px var(--green); }
}
.node-status .label { font-size: 12.5px; color: var(--ink); font-weight: 500; }
.node-status .sub { font-family: var(--mono); font-size: 10px; color: var(--ink-3); letter-spacing: .08em; }

/* ============================================================
   Main column
   ============================================================ */
.main {
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.topbar {
  position: sticky; top: 0;
  z-index: 15;
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 16px 28px;
  background: rgba(11,14,20,.82);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.topbar h1 {
  font-size: 17px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -.01em;
}
.topbar .crumb {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: .1em;
  text-transform: uppercase;
}
.topbar .spacer { flex: 1; }
.clock {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-2);
  letter-spacing: .06em;
}
.clock b { color: var(--cyan); font-weight: 500; }
.pill {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 11px;
  padding: 6px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg-panel);
  color: var(--ink-2);
}
.pill .dot { width: 7px; height: 7px; border-radius: 50%; }

.content {
  padding: 26px 28px 40px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  max-width: 1640px;
  width: 100%;
}

/* ---------- Generic card ---------- */
.card {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: relative;
}
.card-head {
  display: flex; align-items: center; gap: 12px;
  padding: 15px 18px;
  border-bottom: 1px solid var(--border-soft);
}
.card-head h2 {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink);
  margin: 0;
}
.card-head .hint {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: .05em;
}
.card-head .spacer { flex: 1; }

/* ============================================================
   KPI row
   ============================================================ */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}
.kpi {
  background: linear-gradient(180deg, var(--bg-panel) 0%, #0C1017 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 18px 0;
  position: relative;
  overflow: hidden;
  min-height: 158px;
  display: flex;
  flex-direction: column;
}
.kpi::after { /* bottom neon glow strip */
  content: '';
  position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
  background: var(--accent, var(--cyan));
  box-shadow: 0 0 18px 1px var(--accent, var(--cyan));
  opacity: .9;
}
.kpi .kpi-glow {
  position: absolute; left: 50%; bottom: -60px; transform: translateX(-50%);
  width: 75%; height: 80px;
  background: radial-gradient(closest-side, var(--accent, var(--cyan)), transparent);
  opacity: .16; filter: blur(8px); pointer-events: none;
}
.kpi-top { display: flex; align-items: flex-start; justify-content: space-between; }
.kpi-label {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.kpi-ico {
  width: 30px; height: 30px; border-radius: 8px;
  display: grid; place-items: center;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  color: var(--accent, var(--cyan));
}
.kpi-big {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 30px;
  letter-spacing: -.02em;
  margin-top: 14px;
  color: #fff;
  line-height: 1.05;
}
.kpi-big.cyan { color: var(--cyan); text-shadow: 0 0 22px rgba(0,240,255,.35); }
.kpi-sub {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-2);
  margin-top: 7px;
  display: flex; align-items: center; gap: 8px;
}
.kpi-foot {
  margin-top: auto;
  padding: 12px 0 16px;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px;
}

.tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--mono);
  font-size: 10.5px; font-weight: 500;
  padding: 3px 9px; border-radius: 6px;
  letter-spacing: .04em;
  border: 1px solid transparent;
  white-space: nowrap;
}
.tag.green  { color: var(--green);  background: rgba(57,255,20,.08);  border-color: rgba(57,255,20,.22); }
.tag.cyan   { color: var(--cyan);   background: rgba(0,240,255,.08);  border-color: rgba(0,240,255,.22); }
.tag.purple { color: var(--purple-2); background: rgba(157,0,255,.10); border-color: rgba(157,0,255,.28); }
.tag.gray   { color: var(--ink-2);  background: rgba(255,255,255,.04); border-color: var(--border); }
.tag.red    { color: var(--red);    background: rgba(255,59,92,.08);   border-color: rgba(255,59,92,.24); }
.tag.amber  { color: var(--amber);  background: rgba(255,176,32,.08);  border-color: rgba(255,176,32,.24); }

/* VWAP gauge */
.vwap-gauge { margin-top: 14px; }
.vwap-bar {
  height: 8px; border-radius: 6px;
  background: var(--bg-inset);
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.vwap-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, rgba(57,255,20,.4), var(--green));
  box-shadow: 0 0 12px rgba(57,255,20,.5);
  border-radius: 6px;
  transition: width .6s cubic-bezier(.2,.8,.2,1);
}
.vwap-marks { display: flex; justify-content: space-between; margin-top: 8px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); }
.vwap-marks .now { color: var(--ink); }

/* Connected sources widgets */
.sources { display: flex; flex-direction: column; gap: 9px; margin-top: 14px; }
.source-chip {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 11.5px;
}
.source-orb {
  width: 22px; height: 22px; border-radius: 50%;
  display: grid; place-items: center; flex: none;
  font-size: 9px; font-weight: 700;
  position: relative;
}
.source-orb::after {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  border: 1px solid currentColor; opacity: .25;
}
.source-name { color: var(--ink); }
.source-state { margin-left: auto; font-weight: 600; letter-spacing: .06em; }

/* ============================================================
   Center grid: table + ingestion
   ============================================================ */
.center-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 344px;
  gap: 18px;
  align-items: start;
}

/* ---------- Table ---------- */
.table-tools { display: flex; align-items: center; gap: 8px; }
.seg {
  display: inline-flex; padding: 3px; gap: 2px;
  background: var(--bg-inset); border: 1px solid var(--border);
  border-radius: 8px;
}
.seg button {
  font-family: var(--mono); font-size: 11px;
  padding: 5px 11px; border-radius: 6px;
  background: transparent; border: 0; color: var(--ink-3);
  cursor: pointer; letter-spacing: .04em; transition: .15s;
}
.seg button:hover { color: var(--ink); }
.seg button.on { background: rgba(0,240,255,.12); color: var(--cyan); }

.inv-table { width: 100%; border-collapse: collapse; }
.inv-table thead th {
  font-family: var(--mono);
  font-size: 10px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-3);
  text-align: right;
  padding: 11px 9px;
  background: var(--bg-inset);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  position: sticky; top: 0;
}
.inv-table thead th:first-child { text-align: left; padding-left: 16px; }
.inv-table tbody td:first-child { padding-left: 16px; }
.inv-table thead th .arrow { color: var(--cyan); margin-left: 5px; opacity: 0; }
.inv-table thead th.sorted .arrow { opacity: 1; }
.inv-table thead th:hover { color: var(--ink-2); }

.inv-table tbody td {
  padding: 12px 9px;
  text-align: right;
  font-family: var(--mono);
  font-size: 12px;
  border-bottom: 1px solid var(--border-soft);
  white-space: nowrap;
  color: var(--ink);
}
.inv-table tbody td:first-child { text-align: left; }
.inv-table tbody tr { transition: background .15s; }
.inv-table tbody tr:hover { background: #10141d; }
.inv-table tbody tr:last-child td { border-bottom: 0; }

.asset-cell { display: flex; align-items: center; gap: 11px; }
.asset-ico {
  width: 26px; height: 26px; border-radius: 7px;
  display: grid; place-items: center; flex: none;
  font-family: var(--mono); font-weight: 700; font-size: 10px;
  border: 1px solid var(--border);
}
.asset-cell { gap: 9px; }
.asset-meta { display: flex; flex-direction: column; line-height: 1.2; }
.asset-sym { color: #fff; font-weight: 600; font-size: 13px; }
.asset-full { font-family: var(--sans); font-size: 10.5px; color: var(--ink-3); }

.loc-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: var(--mono);
  padding: 3px 8px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-inset);
}
.loc-tag .ld { width: 6px; height: 6px; border-radius: 2px; }

.pnl-pos { color: var(--green); }
.pnl-neg { color: var(--red); }
.pnl-cell { display: inline-flex; flex-direction: column; align-items: flex-end; line-height: 1.25; }
.pnl-pct { font-size: 11px; opacity: .9; }

/* ---------- Performance section (MAR-21) ---------- */
.perf-highlight-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  padding: 16px 18px; border-bottom: 1px solid var(--border);
}
.perf-highlight {
  border: 1px solid var(--accent, var(--border));
  background: color-mix(in srgb, var(--accent, var(--border)) 8%, transparent);
  border-radius: 12px; padding: 12px 14px;
}
.perf-label {
  font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 6px;
}
.perf-asset { font-size: 13px; color: var(--ink-2); margin-bottom: 4px; }
.perf-pct { font-size: 22px; font-weight: 700; font-family: var(--mono); }
.perf-usd { font-size: 12.5px; font-family: var(--mono); opacity: .85; }
@media (max-width: 640px) {
  .perf-highlight-row { grid-template-columns: 1fr; }
}

.num-flash-up { animation: flashUp .7s ease; }
.num-flash-down { animation: flashDown .7s ease; }
@keyframes flashUp { 0% { color: var(--green); text-shadow: 0 0 12px rgba(57,255,20,.6);} 100%{} }
@keyframes flashDown { 0% { color: var(--red); text-shadow: 0 0 12px rgba(255,59,92,.6);} 100%{} }

.table-foot {
  display: flex; align-items: center; gap: 16px;
  padding: 13px 18px;
  border-top: 1px solid var(--border);
  font-family: var(--mono); font-size: 11.5px; color: var(--ink-2);
}
.table-foot .spacer { flex: 1; }
.table-foot b { color: var(--ink); }

/* ---------- History view (MAR-20) ---------- */
.hist-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-inset); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
  color: var(--ink-3);
}
.hist-search input {
  background: transparent; border: 0; outline: 0;
  font-family: var(--mono); font-size: 11.5px; color: var(--ink);
  width: 200px;
}
.hist-search input::placeholder { color: var(--ink-3); }
.hist-type {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10.5px; font-weight: 500;
  padding: 4px 9px; border-radius: 6px;
  border: 1px solid transparent; letter-spacing: .04em;
  white-space: nowrap;
}
.hist-empty {
  padding: 36px 18px; text-align: center;
  color: var(--ink-3); font-family: var(--mono); font-size: 12.5px;
}

/* ---------- Right column: ingestion + logs ---------- */
.right-col { display: flex; flex-direction: column; gap: 18px; }

.dropzone {
  margin: 16px;
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius);
  padding: 30px 18px;
  text-align: center;
  cursor: pointer;
  transition: .2s;
  background:
    repeating-linear-gradient(45deg, rgba(0,240,255,.015) 0 10px, transparent 10px 20px);
}
.dropzone:hover { border-color: rgba(0,240,255,.4); background: rgba(0,240,255,.03); }
.dropzone.drag {
  border-color: var(--cyan);
  background: rgba(0,240,255,.07);
  box-shadow: inset 0 0 30px rgba(0,240,255,.12);
}
.dropzone .dz-ico {
  width: 48px; height: 48px; margin: 0 auto 12px;
  border-radius: 12px; display: grid; place-items: center;
  border: 1px solid rgba(0,240,255,.3);
  color: var(--cyan);
  background: rgba(0,240,255,.05);
}
.dropzone .dz-main {
  font-family: var(--mono); font-size: 13px; color: var(--cyan);
  letter-spacing: .04em; text-shadow: 0 0 16px rgba(0,240,255,.4);
}
.dropzone .dz-sub { font-size: 11px; color: var(--ink-3); margin-top: 6px; font-family: var(--mono); }
.dz-progress { height: 4px; background: var(--bg-inset); border-radius: 4px; margin: 14px 16px 0; overflow: hidden; display: none; }
.dz-progress.show { display: block; }
.dz-progress i { display: block; height: 100%; width: 0; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); transition: width .15s linear; }
.dz-files { padding: 0 16px 14px; display: flex; flex-direction: column; gap: 7px; }
.dz-file {
  display: flex; align-items: center; gap: 9px;
  font-family: var(--mono); font-size: 11px;
  padding: 8px 11px; border-radius: 8px;
  background: var(--bg-inset); border: 1px solid var(--border);
}
.dz-file .ok { color: var(--green); margin-left: auto; }

/* ---------- Event log ---------- */
.log-feed { padding: 8px 8px 12px; max-height: 360px; overflow-y: auto; }
.log-item {
  display: flex; gap: 11px;
  padding: 11px 12px;
  border-radius: 8px;
  position: relative;
}
.log-item:hover { background: #10141d; }
.log-item.fresh { animation: logIn .5s cubic-bezier(.2,.8,.2,1); }
@keyframes logIn {
  from { opacity: 0; transform: translateY(-8px); background: rgba(0,240,255,.06); }
  to { opacity: 1; transform: none; }
}
.log-rail { display: flex; flex-direction: column; align-items: center; flex: none; padding-top: 3px; }
.log-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.log-line-v { width: 1px; flex: 1; background: var(--border); margin-top: 4px; }
.log-body { min-width: 0; flex: 1; }
.log-type {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
}
.log-msg { font-size: 12px; color: var(--ink); margin-top: 3px; line-height: 1.4; }
.log-msg .mono { font-family: var(--mono); }
.log-time { font-family: var(--mono); font-size: 10px; color: var(--ink-4); margin-top: 4px; }

/* ============================================================
   Segregation divider
   ============================================================ */
.seg-divider {
  display: flex; align-items: center; gap: 16px;
  margin: 6px 0 0;
}
.seg-divider .ln { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border-strong), transparent); }
.seg-divider .lbl {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: .2em;
  text-transform: uppercase; color: var(--ink-3);
  display: flex; align-items: center; gap: 9px;
}
.seg-divider .lbl svg { color: var(--purple-2); }

/* ============================================================
   Futures segregated panel
   ============================================================ */
.futures-vault {
  position: relative;
  background:
    radial-gradient(120% 140% at 100% 0%, rgba(157,0,255,.06), transparent 50%),
    var(--bg-panel);
  border: 1px solid rgba(157,0,255,.22);
  border-radius: 14px;
  padding: 2px;
}
.futures-vault::before, .futures-vault::after,
.futures-vault > .corner-tl, .futures-vault > .corner-br {
  content: ''; position: absolute; width: 16px; height: 16px;
  border-color: var(--purple-2); pointer-events: none;
}
.futures-vault::before { top: 8px; left: 8px; border-top: 1.5px solid; border-left: 1.5px solid; }
.futures-vault::after  { bottom: 8px; right: 8px; border-bottom: 1.5px solid; border-right: 1.5px solid; }
.futures-vault > .corner-tr { position: absolute; top: 8px; right: 8px; width: 16px; height: 16px; border-top: 1.5px solid var(--purple-2); border-right: 1.5px solid var(--purple-2); }
.futures-vault > .corner-bl { position: absolute; bottom: 8px; left: 8px; width: 16px; height: 16px; border-bottom: 1.5px solid var(--purple-2); border-left: 1.5px solid var(--purple-2); }

.futures-inner {
  border-radius: 12px;
  padding: 4px;
}
.futures-head {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 22px;
}
.futures-head .ttl { display: flex; flex-direction: column; gap: 3px; }
.futures-head h2 {
  font-size: 13px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; margin: 0; color: #fff;
  display: flex; align-items: center; gap: 10px;
}
.futures-head .isolation-note {
  font-family: var(--mono); font-size: 11px; color: var(--purple-2);
  letter-spacing: .03em;
}
.futures-head .spacer { flex: 1; }

.futures-body {
  display: grid;
  grid-template-columns: 230px 1fr;
  gap: 20px;
  padding: 6px 22px 22px;
}
.fut-stats { display: flex; flex-direction: column; gap: 12px; }
.fut-stat {
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--bg-inset); padding: 13px 15px;
}
.fut-stat .l { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
.fut-stat .v { font-family: var(--mono); font-size: 21px; font-weight: 600; margin-top: 6px; }

.chart-wrap { position: relative; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-inset); padding: 16px 8px 8px; }
.chart-legend { display: flex; gap: 18px; padding: 0 14px 10px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-2); }
.chart-legend span { display: inline-flex; align-items: center; gap: 7px; }
.chart-legend .sw { width: 14px; height: 3px; border-radius: 2px; }
.chart-legend .sw.bar { height: 11px; width: 7px; border-radius: 2px; }

.chart-tip {
  position: absolute; pointer-events: none; opacity: 0;
  transform: translate(-50%, -120%);
  background: #0a0d13; border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 8px 11px;
  font-family: var(--mono); font-size: 11px; white-space: nowrap;
  box-shadow: 0 10px 30px rgba(0,0,0,.6); z-index: 5;
  transition: opacity .12s;
}
.chart-tip .t-date { color: var(--ink-3); font-size: 10px; }
.chart-tip .t-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }

/* ============================================================
   Tooltip (generic hover on KPIs)
   ============================================================ */
.info-dot {
  width: 15px; height: 15px; border-radius: 50%;
  border: 1px solid var(--border-strong); color: var(--ink-3);
  font-size: 9px; display: inline-grid; place-items: center; cursor: help;
  font-family: var(--mono);
}
.tip {
  position: relative;
}
.tip .tip-pop {
  position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(4px);
  background: #0a0d13; border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 9px 12px; width: 210px;
  font-family: var(--sans); font-size: 11px; line-height: 1.5; color: var(--ink-2);
  opacity: 0; pointer-events: none; transition: .18s; z-index: 30;
  box-shadow: 0 14px 40px rgba(0,0,0,.6);
}
.tip:hover .tip-pop { opacity: 1; transform: translateX(-50%); }

/* ---------- Generic section placeholder views ---------- */
.section-view { display: flex; flex-direction: column; gap: 22px; }
.empty-note {
  font-family: var(--mono); font-size: 12px; color: var(--ink-3);
  padding: 40px; text-align: center;
}
/* ---------- Credentials / Settings panel (MAR-22) ---------- */
.cred-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 18px; }
.cred-card {
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--bg-inset); padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.cred-card-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--ink); font-weight: 600;
}
.cred-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.cred-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink-3);
}
.cred-value {
  font-size: 12px; color: var(--ink-2);
  background: var(--bg-panel-2); border: 1px solid var(--border-soft);
  border-radius: 6px; padding: 4px 9px;
}
.set-field { display: flex; flex-direction: column; gap: 5px; }
.set-field label {
  font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink-3);
}
.set-field input, .wallet-row input {
  background: var(--bg-panel-2); border: 1px solid var(--border-strong);
  border-radius: 7px; padding: 8px 10px;
  font-family: var(--mono); font-size: 12px; color: var(--ink);
  outline: 0; width: 100%;
}
.set-field input:focus, .wallet-row input:focus { border-color: var(--cyan); }
.wallet-row { display: grid; grid-template-columns: 1fr 1.6fr auto; gap: 8px; align-items: center; }
.wallet-remove {
  width: 30px; height: 30px; border-radius: 7px;
  background: var(--bg-panel-2); border: 1px solid var(--border-strong);
  color: var(--ink-3); cursor: pointer; font-size: 16px; line-height: 1;
}
.wallet-remove:hover { color: var(--red); border-color: rgba(255,59,92,.4); }
.wallet-add {
  align-self: flex-start;
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; border: 1px dashed var(--border-strong);
  border-radius: 7px; padding: 7px 12px;
  font-family: var(--mono); font-size: 11px; color: var(--ink-3);
  cursor: pointer; transition: .15s;
}
.wallet-add:hover { color: var(--cyan); border-color: var(--cyan); }
.set-actions {
  display: flex; align-items: center; gap: 12px;
  padding: 4px 18px 18px;
}
.set-save-btn {
  background: rgba(0,240,255,.12); border: 1px solid var(--cyan);
  color: var(--cyan); border-radius: 8px; padding: 9px 18px;
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  letter-spacing: .04em; cursor: pointer; transition: .15s;
}
.set-save-btn:hover { background: rgba(0,240,255,.2); }
.set-save-btn:disabled { opacity: .5; cursor: default; }
.set-msg { font-family: var(--mono); font-size: 11.5px; }
.set-msg.ok { color: var(--green); }
.set-msg.err { color: var(--red); }
@media (max-width: 767px) {
  .cred-grid { grid-template-columns: 1fr; }
  .wallet-row { grid-template-columns: 1fr; }
}

.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 18px; }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px;
  background: var(--bg-inset);
}
.setting-row .sl { font-size: 13px; color: var(--ink); }
.setting-row .ss { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin-top: 3px; }
.toggle { width: 42px; height: 24px; border-radius: 20px; background: var(--bg-panel-2); border: 1px solid var(--border-strong); position: relative; cursor: pointer; flex: none; transition: .2s; }
.toggle i { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: var(--ink-3); transition: .2s; }
.toggle.on { background: rgba(0,240,255,.18); border-color: var(--cyan); }
.toggle.on i { left: 20px; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

/* ============================================================
   Mobile dock + compact topbar brand — hidden on desktop
   ============================================================ */
.topbar-brand { display: none; align-items: center; gap: 10px; }
.tb-mark { width: 32px; height: 32px; flex: none; }
.tb-mark svg { width: 32px; height: 32px; }
.tb-name { font-size: 14px; letter-spacing: .12em; font-weight: 600; color: var(--ink); white-space: nowrap; }
.tb-name b { color: var(--cyan); font-weight: 700; }
.mobile-dock { display: none; }

/* ============================================================
   Responsive
   Desktop (>1280) is untouched. Below that, progressive reflow.
   ============================================================ */

/* Wide reflow (existing): 1024–1280 keeps the desktop shell but
   relaxes the KPI + center grids so nothing is cramped. */
@media (max-width: 1280px) and (min-width: 1025px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .center-grid { grid-template-columns: 1fr; }
  .futures-body { grid-template-columns: 1fr; }
  .fut-stats { flex-direction: row; flex-wrap: wrap; }
  .fut-stat { flex: 1; min-width: 150px; }
}

/* ---------- TABLET 768–1024 : collapsible icon-rail sidebar ---------- */
@media (min-width: 768px) and (max-width: 1024px) {
  .app { grid-template-columns: 64px 1fr; }

  .sidebar {
    position: fixed; left: 0; top: 0;
    width: 64px; height: 100vh;
    overflow: hidden; white-space: nowrap;
    transition: width .22s cubic-bezier(.2,.8,.2,1);
    z-index: 60;
  }
  .sidebar:hover, .sidebar:focus-within {
    width: 252px;
    box-shadow: 24px 0 70px -22px rgba(0,0,0,.85);
  }
  .brand { padding: 18px 0 18px 16px; }
  .nav { padding: 14px 12px; }
  .nav-item { padding: 11px 12px; min-height: 44px; }
  .node-status { margin: 12px; padding: 12px; }

  /* keep icons, fade the words until expanded */
  .brand > div:last-child,
  .brand-name, .brand-sub,
  .nav-label,
  .nav-item span, .nav-item .badge,
  .node-status > div:last-child {
    opacity: 0; transition: opacity .14s ease;
  }
  .sidebar:hover .brand > div:last-child,
  .sidebar:hover .nav-label,
  .sidebar:hover .nav-item span,
  .sidebar:hover .nav-item .badge,
  .sidebar:hover .node-status > div:last-child,
  .sidebar:focus-within .brand > div:last-child,
  .sidebar:focus-within .nav-label,
  .sidebar:focus-within .nav-item span,
  .sidebar:focus-within .nav-item .badge,
  .sidebar:focus-within .node-status > div:last-child {
    opacity: 1;
  }

  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .center-grid { grid-template-columns: 1fr; }
  .futures-body { grid-template-columns: 1fr; }
  .fut-stats { flex-direction: row; flex-wrap: wrap; }
  .fut-stat { flex: 1; min-width: 150px; }
  /* table can keep horizontal scroll if it needs to */
  .inv-table { min-width: 640px; }
}

/* ---------- MOBILE < 768 : dock + stacked cards ---------- */
@media (max-width: 767px) {
  .app { grid-template-columns: 1fr; overflow-x: hidden; }
  .sidebar { display: none; }
  body { overflow-x: hidden; }

  /* compact header → brand + clock only */
  .topbar { padding: 11px 15px; gap: 12px; }
  .topbar .crumb, .topbar h1, .topbar .pill { display: none; }
  .topbar-brand { display: flex; }
  .topbar .spacer { flex: 1; }
  .clock { font-size: 11px; }

  .content {
    padding: 15px 13px calc(86px + env(safe-area-inset-bottom));
    gap: 15px;
  }

  /* KPI → 2×2 */
  .kpi-row { grid-template-columns: repeat(2, 1fr); gap: 11px; }
  .kpi { min-height: 0; padding: 14px 13px 0; }
  .kpi-big, .kpi-big.cyan { font-size: 21px; margin-top: 9px; }
  .kpi-sub { font-size: 11px; }
  .kpi-foot { padding: 10px 0 13px; }
  .kpi-label { font-size: 9.5px; }
  .sources { gap: 7px; }
  .source-chip { font-size: 10.5px; }
  .source-name { white-space: nowrap; }
  .source-state { font-size: 10px; }
  /* VWAP gauge: keep only the centered status on narrow cards */
  .vwap-marks { font-size: 10px; }
  .vwap-marks span:first-child,
  .vwap-marks span:last-child { display: none; }
  .vwap-marks .now { margin: 0 auto; }

  .center-grid { grid-template-columns: 1fr; gap: 15px; }
  .futures-body { grid-template-columns: 1fr; padding: 4px 14px 16px; gap: 16px; }
  .fut-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .futures-head { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
  .futures-head .isolation-note { font-size: 10px; }

  /* sortable header tools wrap nicely */
  .card-head { flex-wrap: wrap; row-gap: 10px; }
  .table-foot { flex-wrap: wrap; gap: 8px 14px; }

  /* ----- inventory TABLE → per-asset CARDS ----- */
  .inv-table { min-width: 0; }
  .inv-table thead { display: none; }
  .inv-table, .inv-table tbody, .inv-table tr, .inv-table td { display: block; width: 100%; }
  .inv-table tbody tr {
    margin: 12px; padding: 14px 15px;
    border: 1px solid var(--border); border-radius: 11px;
    background: var(--bg-inset);
  }
  .inv-table tbody tr:hover { background: var(--bg-inset); }
  .inv-table tbody td {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0; border: 0; text-align: right; white-space: nowrap;
    font-size: 12.5px;
  }
  .inv-table tbody td::before {
    content: attr(data-label);
    font-family: var(--mono); font-size: 9.5px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--ink-3);
    text-align: left; margin-right: 14px;
  }
  /* asset = card header (no label, full-width divider) */
  .inv-table tbody td:first-child {
    padding: 0 0 11px; margin-bottom: 9px;
    border-bottom: 1px solid var(--border-soft);
  }
  .inv-table tbody td:first-child::before { display: none; }
  .inv-table tbody td:first-child .asset-cell { width: 100%; }
  .pnl-cell { align-items: flex-end; }

  /* history table: first column is "Fecha", not an asset header */
  .hist-table tbody td:first-child {
    padding: 7px 0; margin-bottom: 0; border-bottom: 0;
  }
  .hist-table tbody td:first-child::before { display: block; }
  .hist-search { width: 100%; }
  .hist-search input { width: 100%; }

  /* ----- bottom dock ----- */
  .mobile-dock {
    display: flex; align-items: center; justify-content: space-around;
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 100;
    height: calc(66px + env(safe-area-inset-bottom));
    padding: 0 6px env(safe-area-inset-bottom);
    background: rgba(12,16,23,.94);
    backdrop-filter: blur(18px) saturate(1.2);
    border-top: 1px solid var(--border);
    box-shadow: 0 -10px 30px -12px rgba(0,0,0,.7);
  }
  .dock-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: 0; cursor: pointer;
    color: var(--ink-3); font-family: var(--sans);
    min-height: 44px; height: 66px; justify-content: center;
    transition: color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .dock-tab .dock-lbl { font-size: 10px; letter-spacing: .02em; }
  .dock-tab.on { color: var(--cyan); }
  .dock-tab.on svg { filter: drop-shadow(0 0 7px var(--cyan)); }
  .dock-tab:active { color: var(--ink); }

  .dock-add {

    hgt - ((v - min) / rng) * hgt,

              h('span', { className: 'pnl-pct', key: 'b' }, (posUnreal ? '+' : '') + row.pnl_pct.toFixed(2) + '%'),
            ])),
          h('td', {
            key: 'r', 'data-label': 'PnL Realizado', style: { textAlign: 'right' },
            className: hasRealized ? (posReal ? 'pnl-pos' : 'pnl-neg') : '',
          }, hasRealized ? (posReal ? '+' : '−') + fmtUSD(Math.abs(row.realized_pnl)).slice(1) : '—'),
        ]);

}

Object.assign(window, { Sidebar, Topbar, KpiRow, InventoryTable, PerformanceSection });

})();

<script type="text/babel" data-presets="react">
;(function(){
/* ============================================================
   QUANTUM PMS — Ingestion (CSV drop), Event log, Futures chart
   ============================================================ */
const { createElement: h, useState, useEffect, useRef } = React;

/* ----------------------------- CSV Dropzone ----------------------------- */
function Dropzone({ onIngest }) {
  const [drag, setDrag] = useState(false);
  const [progress, setProgress] = useState(null);   // 0..100 or null
  const [files, setFiles] = useState([]);
  const inputRef = useRef(null);

  const runImport = (file) => {
    const fname = file ? file.name : `bingx_export_${Math.floor(Math.random() * 900 + 100)}.csv`;
    setProgress(0);
    let p = 0;
    const t = setInterval(() => {
      p += Math.random() * 16 + 6;
      if (p >= 100) {
        p = 100;
        clearInterval(t);
        setProgress(100);
        const finish = (fills) => setTimeout(() => {
          setProgress(null);
          setFiles(f => [{ name: fname, fills }, ...f].slice(0, 3));
          onIngest && onIngest(fname, fills);
        }, 350);
        if (file) {
          const form = new FormData();
          form.append('file', file);
          fetch('/api/import/csv', { method: 'POST', body: form })
            .then(r => r.ok ? r.json() : null)
            .then(data => finish(data && data.fills ? data.fills : Math.floor(Math.random() * 80 + 20)))
            .catch(() => finish(Math.floor(Math.random() * 80 + 20)));
        } else {
          finish(Math.floor(Math.random() * 80 + 20));
        }
      } else {
        setProgress(p);
      }
    }, 130);
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDrag(false);
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    runImport(f || null);
  };

  return h('div', { className: 'card', key: 'dz' }, [
    h('div', { className: 'card-head', key: 'h' }, [
      h('h2', { key: 't' }, 'Data Ingestion'),
      h('span', { className: 'hint', key: 'hint' }, 'event-sourced'),
    ]),
    h('div', {
      key: 'zone',
      className: 'dropzone' + (drag ? ' drag' : ''),
      onDragOver: (e) => { e.preventDefault(); setDrag(true); },
      onDragLeave: () => setDrag(false),
      onDrop,
      onClick: () => inputRef.current && inputRef.current.click(),
    }, [
      h('input', { key: 'in', ref: inputRef, type: 'file', accept: '.csv', style: { display: 'none' },
        onChange: (e) => { const f = e.target.files[0]; if (f) runImport(f); e.target.value = ''; } }),
      h('div', { className: 'dz-ico', key: 'i' }, Icons.upload({ size: 24 })),
      h('div', { className: 'dz-main', key: 'm' }, 'Drop BingX / Generic CSV here'),
      h('div', { className: 'dz-sub', key: 's' }, drag ? 'Suelta para procesar…' : 'o haz clic para seleccionar archivo'),
    ]),
    h('div', { key: 'pg', className: 'dz-progress' + (progress !== null ? ' show' : '') },
      h('i', { style: { width: (progress || 0) + '%' } })),
    files.length ? h('div', { className: 'dz-files', key: 'f' }, files.map((f, i) =>
      h('div', { className: 'dz-file', key: i }, [

/* ----------------------------- History View (MAR-20) ----------------------------- */
const HIST_COLS = [
  { key: 'timestamp',       label: 'Fecha',          align: 'right' },
  { key: 'event_type',      label: 'Tipo',           align: 'left'  },
  { key: 'asset',           label: 'Activo',         align: 'left'  },
  { key: 'quantity',        label: 'Cantidad',       align: 'right' },
  { key: 'price',           label: 'Precio',         align: 'right' },
  { key: 'venue',           label: 'Origen / Venue', align: 'left'  },
  { key: 'destination',     label: 'Destino',        align: 'left'  },
  { key: 'fee',             label: 'Fee',            align: 'right' },
  { key: 'transaction_hash',label: 'TX / Referencia',align: 'left'  },
];

function HistoryView() {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [assetFilter, setAssetFilter] = useState('Todos');
  const [search, setSearch] = useState('');

  useEffect(() => {
    let cancelled = false;
    if (!window.QuantumAPI) { setLoading(false); return; }
    setLoading(true);
    window.QuantumAPI.events({ limit: 500 })
      .then((data) => {
        if (cancelled) return;
        setEvents(data.events || []);
        setLoading(false);
      })
      .catch(() => {
        if (cancelled) return;
        setError('No se pudo cargar el historial.');
        setLoading(false);

    return () => { cancelled = true; };
  }, []);

  const assets = useMemo(() => {
    const set = new Set(events.map(e => e.asset));

      rows = rows.filter(e =>
        (e.transaction_hash || '').toLowerCase().includes(q) ||

        (e.destination || '').toLowerCase().includes(q)
      );
    }
    return rows;
  }, [events, assetFilter, search]);

  return h('div', { className: 'card', style: { overflow: 'hidden' } }, [
    h('div', { className: 'card-head', key: 'h' }, [
      h('h2', { key: 't' }, 'Registro Histórico Completo'),
      h('span', { className: 'hint', key: 'hint' }, filtered.length + ' eventos'),
      h('div', { className: 'spacer', key: 'sp' }),
      h('div', { className: 'hist-search', key: 'search' }, [
        Icons.search({ key: 'i', size: 14 }),
        h('input', {
          key: 'in', type: 'text', placeholder: 'Buscar por TX hash, venue o destino…',
          value: search, onChange: (e) => setSearch(e.target.value),
        }),
      ]),
      h('div', { className: 'seg', key: 'seg' }, assets.map(a =>
        h('button', { key: a, className: assetFilter === a ? 'on' : '', onClick: () => setAssetFilter(a) }, a)
      )),
    ]),
    loading ? h('div', { className: 'hist-empty', key: 'l' }, 'Cargando historial…')
    : error ? h('div', { className: 'hist-empty', key: 'e' }, error)
    : !filtered.length ? h('div', { className: 'hist-empty', key: 'em' }, 'Sin eventos para los filtros seleccionados.')
    : h('div', { key: 'tw', style: { overflowX: 'auto' } }, h('table', { className: 'inv-table hist-table' }, [
      h('thead', { key: 'h' }, h('tr', {}, HIST_COLS.map(c =>
        h('th', { key: c.key, style: { textAlign: c.align } }, c.label)
      ))),
      h('tbody', { key: 'b' }, filtered.map(ev => {
        const t = EVENT_TYPES[ev.label] || { color: '#9AA4B6', dot: '#9AA4B6' };
        const icon = EVENT_ICONS[ev.label] || 'plug';

            ev.transaction_hash || '—'),
        ]);
      })),
    ])),
  ]);
}

/* ----------------------------- Futures Chart ----------------------------- */
function FuturesChart({ data }) {
  const ref = useRef(null);
  const [tip, setTip] = useState(null);
  const W = 760, H = 240, padL = 8, padR = 8, padT = 14, padB = 26;
  const iw = W - padL - padR, ih = H - padT - padB;

  const flows = data.map(d => d.flow);
  const eqs = data.map(d => d.equity);
  const maxFlow = Math.max(...flows.map(Math.abs)) || 1;
  const minEq = Math.min(...eqs), maxEq = Math.max(...eqs);
  const eqRng = (maxEq - minEq) || 1;

  const n = data.length;
  const slot = iw / n;
  const barW = slot * 0.42;
  const zeroY = padT + ih * 0.62; // baseline for bars (PnL +/-)

  const x = (i) => padL + slot * i + slot / 2;
  const eqY = (v) => padT + ih - ((v - minEq) / eqRng) * (ih * 0.86) - 6;

  const linePts = data.map((d, i) => [x(i), eqY(d.equity)]);
  const lineD = linePts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const areaD = lineD + ` L${x(n - 1).toFixed(1)} ${padT + ih} L${x(0).toFixed(1)} ${padT + ih} Z`;

  const handleMove = (e) => {
    const rect = ref.current.getBoundingClientRect();
    const px = (e.clientX - rect.left) * (W / rect.width);
    let idx = Math.round((px - padL - slot / 2) / slot);
    idx = Math.max(0, Math.min(n - 1, idx));
    setTip({ idx, left: (x(idx) / W) * rect.width, top: (eqY(data[idx].equity) / H) * rect.height });
  };

  return h('div', { className: 'chart-wrap', key: 'cw' }, [
    h('div', { className: 'chart-legend', key: 'lg' }, [

      key: 'svg', ref, viewBox: `0 0 ${W} ${H}`, width: '100%',

      h('defs', { key: 'defs' }, [
        h('linearGradient', { key: 'eq', id: 'eqGrad', x1: 0, y1: 0, x2: 0, y2: 1 }, [
          h('stop', { key: 1, offset: 0, stopColor: '#00F0FF', stopOpacity: .28 }),
          h('stop', { key: 2, offset: 1, stopColor: '#00F0FF', stopOpacity: 0 }),
        ]),
      ]),
      // gridlines
      ...[0.25, 0.5, 0.75].map((g, i) =>
        h('line', { key: 'g' + i, x1: padL, x2: W - padR, y1: padT + ih * g, y2: padT + ih * g, stroke: '#161B25', strokeWidth: 1 })),
      // zero baseline
      h('line', { key: 'z', x1: padL, x2: W - padR, y1: zeroY, y2: zeroY, stroke: '#2A3242', strokeWidth: 1, strokeDasharray: '3 3' }),
      // bars
      ...data.map((d, i) => {
        const hgt = (Math.abs(d.flow) / maxFlow) * (ih * 0.32);
        const pos = d.flow >= 0;
        const by = pos ? zeroY - hgt : zeroY;
        const col = pos ? '#39FF14' : '#FF3B5C';
        const hot = tip && tip.idx === i;
        return h('rect', {
          key: 'b' + i, x: x(i) - barW / 2, y: by, width: barW, height: Math.max(2, hgt),
          rx: 2, fill: col, opacity: hot ? 1 : .62,
          style: hot ? { filter: `drop-shadow(0 0 6px ${col})` } : null,
        });
      }),
      // equity area + line
      h('path', { key: 'area', d: areaD, fill: 'url(#eqGrad)' }),
      h('path', { key: 'line', d: lineD, fill: 'none', stroke: '#00F0FF', strokeWidth: 2, style: { filter: 'drop-shadow(0 0 6px rgba(0,240,255,.5))' } }),
      // points
      ...linePts.map((p, i) => h('circle', {
        key: 'pt' + i, cx: p[0], cy: p[1], r: tip && tip.idx === i ? 4.5 : 2.5,
        fill: '#0B0E14', stroke: '#00F0FF', strokeWidth: 1.6,
      })),
      // x labels (every other)
      ...data.map((d, i) => i % 2 === 1 ? h('text', {
        key: 'x' + i, x: x(i), y: H - 8, fill: '#5E6877', fontSize: 9,
        textAnchor: 'middle', fontFamily: 'IBM Plex Mono',
      }, d.d) : null),
      tip ? h('line', { key: 'cur', x1: x(tip.idx), x2: x(tip.idx), y1: padT, y2: padT + ih, stroke: '#00F0FF', strokeWidth: 1, strokeOpacity: .3 }) : null,
    ]),
    tip ? h('div', {
      key: 'tip', className: 'chart-tip', style: { left: tip.left, top: tip.top, opacity: 1 },
    }, [
      h('div', { className: 't-date', key: 'd' }, data[tip.idx].d),
      h('div', { className: 't-row', key: 'e' }, [
        h('span', { key: 's', style: { width: 8, height: 2, background: '#00F0FF', display: 'inline-block' } }),
        h('span', { key: 'l', style: { color: 'var(--ink-3)' } }, 'Equity '),
        h('span', { key: 'v', style: { color: '#00F0FF' } }, fmtUSD(data[tip.idx].equity)),
      ]),
      h('div', { className: 't-row', key: 'p' }, [
        h('span', { key: 'l', style: { color: 'var(--ink-3)' } }, 'PnL sesión '),
        h('span', { key: 'v', style: { color: data[tip.idx].flow >= 0 ? '#39FF14' : '#FF3B5C' } },
          (data[tip.idx].flow >= 0 ? '+' : '−') + fmtUSD(Math.abs(data[tip.idx].flow))),
      ]),
    ]) : null,
  ]);
}

              h('div', { className: 'v', key: 'v', style: { color: realizedTotal >= 0 ? '#39FF14' : '#FF3B5C' } },

              h('div', { key: 'n', style: { fontFamily: 'var(--mono)', fontSize: 9.5, color: 'var(--ink-3)', marginTop: 4 } }, 'cero contaminación de coste'),
            ]),
          ]),
          h(FuturesChart, { key: 'chart', data }),
        ]),
      ]),
    ]),
  ]);
}

Object.assign(window, { Dropzone, EventLog, HistoryView, FuturesChart, FuturesVault });

})();

<script type="text/babel" data-presets="react">
;(function(){
/* ============================================================
   QUANTUM PMS — App root, live engine, section routing
   ============================================================ */
const { createElement: h, useState, useEffect, useMemo } = React;

let UID = 1000;
function seedEvents() {
  return SEED_EVENTS.map(e => ({ ...e, uid: UID++, fresh: false }));
}

function App() {
  const [active, setActive] = useState('dashboard');
  const [rows, setRows] = useState(() => INVENTORY.map(r => ({ ...r })));
  const [futuresData, setFuturesData] = useState(() => FUTURES_FLOW.map(r => ({ ...r })));
  const [flashMap, setFlashMap] = useState({});
  const [filter, setFilter] = useState('Todos');
  const [sort, setSort] = useState({ key: 'pnl', dir: 'desc' });
  const [events, setEvents] = useState(seedEvents);
  const [pnlData, setPnlData] = useState(null);

  // -------- backend bootstrap + websocket stream --------
  useEffect(() => {
    let cancelled = false;
    if (!window.QuantumAPI) return;

    window.QuantumAPI.snapshot()
      .then((snapshot) => {
        if (cancelled) return;
        if (snapshot.inventory) setRows(snapshot.inventory.map(r => ({ ...r })));
        if (snapshot.futures) setFuturesData(snapshot.futures.map(r => ({ ...r })));
        if (snapshot.events) {
          setEvents(snapshot.events.map(e => ({ ...e, uid: UID++, fresh: false })));
        }
      })
      .catch(() => {});

    window.QuantumAPI.pnl()
      .then((data) => { if (!cancelled) setPnlData(data); })
      .catch(() => {});

    const ws = window.QuantumAPI.connect((message) => {
      if (cancelled || message.kind !== 'event') return;
      setEvents(prev => {
        const aged = prev.map(e => ({ ...e, fresh: false }));
        const fresh = { ...message.event, uid: UID++, ago: 'now', fresh: true };
        return [fresh, ...aged].slice(0, 11);
      });
    });

    return () => {
      cancelled = true;
      if (ws) ws.close();
    };
  }, []);

  // -------- live price ticks --------
  useEffect(() => {
    const t = setInterval(() => {
      setRows(prev => {
        const flashes = {};
        const next = prev.map(r => {
          // stablecoins barely move
          const vol = (r.sym === 'USDC' || r.sym === 'USDT') ? 0.0004 : 0.006;
          const drift = (Math.random() - 0.5) * 2 * vol;
          let np = r.price * (1 + drift);
          if (r.sym === 'USDC' || r.sym === 'USDT') np = Math.min(1.003, Math.max(0.997, np));
          flashes[r.id] = np >= r.price ? 'up' : 'down';
          return { ...r, price: np };
        });
        setFlashMap(flashes);
        return next;
      });
    }, 2600);
    return () => clearInterval(t);
  }, []);

  // clear flash classes shortly after each tick
  useEffect(() => {
    if (!Object.keys(flashMap).length) return;
    const t = setTimeout(() => setFlashMap({}), 750);
    return () => clearTimeout(t);
  }, [flashMap]);

  // -------- live event stream --------
  useEffect(() => {
    let i = 0;
    const t = setInterval(() => {
      const pick = LIVE_EVENT_POOL[i % LIVE_EVENT_POOL.length];
      i++;
      setEvents(prev => {
        const aged = prev.map(e => ({ ...e, fresh: false }));
        const fresh = { ...pick, uid: UID++, ago: 'now', fresh: true };
        return [fresh, ...aged].slice(0, 11);
      });
    }, 6500);
    return () => clearInterval(t);
  }, []);

  const ingestCSV = (name, fills) => {
    setEvents(prev => {
      const aged = prev.map(e => ({ ...e, fresh: false }));
      const fresh = {
        type: 'IMPORTACIÓN CSV',
        parts: [name + ' importado ', { mono: `· ${fills} fills` }],
        uid: UID++, ago: 'now', fresh: true,
      };
      return [fresh, ...aged].slice(0, 11);
    });
  };

  // -------- derived totals --------
  const totals = useMemo(() => {
    const netUSD = rows.reduce((s, r) => s + r.qty * r.price, 0);
    const costUSD = rows.reduce((s, r) => s + r.qty * r.avg, 0);
    const btc = rows.find(r => r.sym === 'BTC');
    const netBTC = btc ? netUSD / btc.price : 0;
    const vwapPct = ((netUSD - costUSD) / costUSD) * 100;
    return {
      netUSD, netBTC, vwapPct,
      deltaPct: 2.18,
      marginUSD: 28420.00,
      marginPct: 34.6,
    };
  }, [rows]);

  // -------- filter + sort --------
  const viewRows = useMemo(() => {
    let r = rows;
    if (filter !== 'Todos') {
      const map = { BingX: 'BingX', Trezor: 'Trezor', Arbitrum: 'Arbitrum' };
      r = r.filter(x => x.loc === map[filter]);
    }
    const dir = sort.dir === 'asc' ? 1 : -1;
    const val = (row) => {
      switch (sort.key) {
        case 'sym': return row.sym;
        case 'loc': return row.loc;
        case 'qty': return row.qty;
        case 'avg': return row.avg;
        case 'price': return row.price;
        case 'pnl': return (row.qty * row.price - row.qty * row.avg) / (row.qty * row.avg);
        default: return 0;
      }
    };
    return [...r].sort((a, b) => {
      const va = val(a), vb = val(b);
      if (typeof va === 'string') return va.localeCompare(vb) * dir;
      return (va - vb) * dir;
    });
  }, [rows, filter, sort]);

  const onSort = (key) => setSort(s => s.key === key ? { key, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'desc' });

  // -------- section views --------
  let body;
  if (active === 'dashboard') {
    body = h(React.Fragment, {}, [
      h(KpiRow, { key: 'kpi', totals, sparks: rows }),
      h('div', { className: 'center-grid', key: 'cg' }, [
        h(InventoryTable, { key: 't', rows: viewRows, filter, onFilter: setFilter, sort, onSort, flashMap }),
        h('div', { className: 'right-col', key: 'rc' }, [
          h(Dropzone, { key: 'dz', onIngest: ingestCSV }),
          h(EventLog, { key: 'log', events }),
        ]),
      ]),
      h(PerformanceSection, { key: 'perf', pnlData }),
      h(FuturesVault, { key: 'fv', data: futuresData }),
    ]);
  } else if (active === 'spot') {
    body = h('div', { className: 'section-view' }, [
      h(InventoryTable, { key: 't', rows: viewRows, filter, onFilter: setFilter, sort, onSort, flashMap }),
      h(PerformanceSection, { key: 'perf', pnlData }),
    ]);
  } else if (active === 'hedge') {
    body = h('div', { className: 'section-view' }, [ h(FuturesVault, { key: 'fv', data: futuresData }) ]);
  } else if (active === 'apis') {
    body = h('div', { className: 'center-grid', style: { gridTemplateColumns: '1fr 1fr' } }, [
      h(Dropzone, { key: 'dz', onIngest: ingestCSV }),
      h(EventLog, { key: 'log', events }),
    ]);
  } else if (active === 'historial') {
    body = h('div', { className: 'section-view' }, [ h(HistoryView, { key: 'hist' }) ]);
  } else {
    body = h(SettingsView, { key: 'set' });
  }

  return h('div', { className: 'app' }, [
    h(Sidebar, { key: 'sb', active, onNav: setActive }),
    h('main', { className: 'main', key: 'main' }, [
      h(Topbar, { key: 'tb', active }),
      h('div', { className: 'content', key: 'c' }, body),
    ]),
    h(MobileDock, { key: 'dock', active, onNav: setActive }),
  ]);
}

  const [error, setError] = useState(null);
  const [form, setForm] = useState({ bingx_api_key: '', bingx_api_secret: '', arbitrum_rpc_url: '' });
  const [walletDraft, setWalletDraft] = useState([]);

  const [saveMsg, setSaveMsg] = useState(null);

  useEffect(() => {
    let cancelled = false;
    if (!window.QuantumAPI) { setLoading(false); return; }
    window.QuantumAPI.getSettings()
      .then((data) => {
        if (cancelled) return;
        setSettings(data);
        setWalletDraft(Object.entries(data.arbitrum_wallets || {}).map(([name, address]) => ({ name, address })));
        setLoading(false);
      })
      .catch(() => {
        if (cancelled) return;
        setError('No se pudo cargar la configuración.');
        setLoading(false);
      });
    return () => { cancelled = true; };
  }, []);

  const updateField = (key, value) => setForm(f => ({ ...f, [key]: value }));
  const updateWallet = (idx, key, value) =>

    setSaving(true);
    setSaveMsg(null);

    if (form.bingx_api_key.trim()) payload.bingx_api_key = form.bingx_api_key.trim();
    if (form.bingx_api_secret.trim()) payload.bingx_api_secret = form.bingx_api_secret.trim();
    if (form.arbitrum_rpc_url.trim()) payload.arbitrum_rpc_url = form.arbitrum_rpc_url.trim();
    const wallets = {};
    walletDraft.forEach(w => { if (w.name.trim() && w.address.trim()) wallets[w.name.trim()] = w.address.trim(); });

        setSettings(data);
        setForm({ bingx_api_key: '', bingx_api_secret: '', arbitrum_rpc_url: '' });

      h('h2', { key: 't' }, 'Conexiones & Secretos'),
      h('span', { className: 'hint', key: 'hint' }, 'Las claves se guardan localmente y nunca se muestran completas'),
    ]),
    h('div', { className: 'cred-grid', key: 'g' }, [
      h('div', { className: 'cred-card', key: 'bingx' }, [
        h('div', { className: 'cred-card-title', key: 't' }, [
          h('span', { key: 's', className: 'tag ' + (settings.bingx_configured ? 'green' : 'gray') },
            settings.bingx_configured ? 'CONECTADO' : 'SIN CONFIGURAR'),
          'BingX API (solo lectura)',
        ]),
        h('div', { className: 'cred-row', key: 'k' }, [
          h('span', { className: 'cred-label', key: 'l' }, 'API Key'),
          h('span', { className: 'cred-value mono', key: 'v' }, settings.bingx_api_key || '— sin configurar —'),
        ]),
        h('div', { className: 'cred-row', key: 's' }, [
          h('span', { className: 'cred-label', key: 'l' }, 'API Secret'),
          h('span', { className: 'cred-value mono', key: 'v' }, settings.bingx_api_secret || '— sin configurar —'),
        ]),
        h('div', { className: 'set-field', key: 'fk' }, [
          h('label', { key: 'l' }, 'Nueva API Key'),
          h('input', {
            key: 'i', type: 'password', placeholder: '••••••••••••••••',
            value: form.bingx_api_key, onChange: e => updateField('bingx_api_key', e.target.value),
          }),

        h('div', { className: 'set-field', key: 'fs' }, [
          h('label', { key: 'l' }, 'Nuevo API Secret'),
          h('input', {
            key: 'i', type: 'password', placeholder: '••••••••••••••••',
            value: form.bingx_api_secret, onChange: e => updateField('bingx_api_secret', e.target.value),
          }),

      h('div', { className: 'cred-card', key: 'arb' }, [

      h('button', { key: 'save', className: 'set-save-btn', disabled: saving, onClick: save },
        saving ? 'Guardando…' : 'Guardar cambios'),
    ]),
  ]);

  const items = [
    { l: 'Motor VWAP en tiempo real', s: 'Recalcula coste promedio en cada fill', on: true },
    { l: 'Segregación de futuros', s: 'Aísla margen y PnL del inventario Spot', on: true },
    { l: 'Auto-sync BingX API', s: 'Reconciliación cada 60s', on: true },
    { l: 'Attestation Trezor', s: 'Verificación de vault en frío', on: true },
    { l: 'Alertas de drift', s: 'Notificar si snapshot diverge >0.1%', on: false },
    { l: 'Modo neón intenso', s: 'Aumenta el glow de los acentos', on: false },
  ];
  const [state, setState] = useState(items.map(i => i.on));
  return h(React.Fragment, {}, [
    h(CredentialsPanel, { key: 'cred' }),
    h('div', { className: 'card', style: { padding: 4 }, key: 'toggles' }, [
      h('div', { className: 'card-head', key: 'h' }, [ h('h2', { key: 't' }, 'Configuración del sistema') ]),
      h('div', { className: 'settings-grid', key: 'g' }, items.map((it, i) =>
        h('div', { className: 'setting-row', key: i }, [
          h('div', { key: 'l' }, [
            h('div', { className: 'sl', key: 'a' }, it.l),
            h('div', { className: 'ss', key: 'b' }, it.s),
          ]),
          h('div', { key: 't', className: 'toggle' + (state[i] ? ' on' : ''),
            onClick: () => setState(s => s.map((v, j) => j === i ? !v : v)) }, h('i')),
        ])
      )),
    ]),
  ]);
}

function MobileDock({ active, onNav }) {
  const tabs = [
    { key: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
    { key: 'spot',      icon: 'spot',      label: 'Spot' },
    { key: '__add',     center: true },
    { key: 'hedge',     icon: 'hedge',     label: 'Futuros' },
    { key: 'settings',  icon: 'settings',  label: 'Config' },
  ];
  return h('nav', { className: 'mobile-dock', role: 'navigation', 'aria-label': 'Navegación principal' },
    tabs.map(t => {
      if (t.center) {
        return h('button', {
          key: 'add',
          className: 'dock-add' + (active === 'apis' ? ' on' : ''),
          'aria-label': 'Importar datos / CSV',
          onClick: () => onNav('apis'),
        }, Icons.plus({ size: 26, stroke: 2.2 }));
      }
      return h('button', {
        key: t.key,
        className: 'dock-tab' + (active === t.key ? ' on' : ''),
        onClick: () => onNav(t.key),
      }, [
        Icons[t.icon]({ key: 'i', size: 21 }),
        h('span', { className: 'dock-lbl', key: 'l' }, t.label),
      ]);
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));

})();
</script>
